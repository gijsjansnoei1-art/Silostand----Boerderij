<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Silostand · Voorraadbeheer voor boeren</title>
<link rel="icon" href="data:,">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Expanded:wght@600;800&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --cream: #F6F1E4;
    --card: #FFFCF6;
    --ink: #2A2117;
    --ink-soft: #6B6253;
    --terracotta: #C17A3F;
    --rule: #E4DCC8;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { background: var(--cream); }

  .app-root {
    background: var(--cream);
    min-height: 100vh;
    color: var(--ink);
    font-family: 'Inter', system-ui, sans-serif;
    padding-bottom: 64px;
  }

  .app-header {
    padding: 28px 20px 20px;
    max-width: 1100px;
    margin: 0 auto;
  }

  .eyebrow {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--terracotta);
    margin: 0 0 6px;
  }

  .app-title {
    font-family: 'Archivo Expanded', sans-serif;
    font-weight: 800;
    font-size: clamp(28px, 6vw, 42px);
    letter-spacing: -0.01em;
    margin: 0 0 6px;
    line-height: 1.05;
  }

  .app-sub {
    color: var(--ink-soft);
    font-size: 15px;
    margin: 0 0 18px;
    max-width: 50ch;
  }

  .summary-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    margin-bottom: 4px;
  }

  .pill {
    font-size: 13px;
    font-weight: 600;
    padding: 7px 13px;
    border-radius: 999px;
    background: var(--card);
    border: 1px solid var(--rule);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .pill .dot { width: 8px; height: 8px; border-radius: 50%; }

  .main-grid {
    max-width: 1100px;
    margin: 0 auto;
    padding: 8px 20px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(310px, 1fr));
    gap: 18px;
  }

  .add-card {
    border: 2px dashed var(--rule);
    border-radius: 18px;
    background: transparent;
    min-height: 280px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    color: var(--ink-soft);
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 15px;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }
  .add-card:hover { border-color: var(--terracotta); color: var(--terracotta); background: #FFFCF6; }
  .add-card-plus {
    width: 44px; height: 44px;
    border-radius: 50%;
    border: 2px solid currentColor;
    display: flex; align-items: center; justify-content: center;
    font-size: 24px; line-height: 1;
  }

  .silo-card {
    background: var(--card);
    border-radius: 18px;
    border: 1px solid var(--rule);
    padding: 16px 16px 0;
    display: flex;
    flex-direction: column;
    box-shadow: 0 1px 2px rgba(42,33,23,0.04);
  }

  .silo-card-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    margin-bottom: 8px;
  }

  .silo-name-input {
    font-family: 'Archivo Expanded', sans-serif;
    font-weight: 800;
    font-size: 19px;
    border: none;
    background: transparent;
    color: var(--ink);
    padding: 4px 2px;
    width: 100%;
    border-radius: 6px;
  }
  .silo-name-input:focus { outline: 2px solid var(--terracotta); outline-offset: 1px; background: #fff; }

  .icon-btn {
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-size: 16px;
    width: 32px; height: 32px;
    border-radius: 8px;
    cursor: pointer;
    flex-shrink: 0;
  }
  .icon-btn:hover { background: #FBEAE6; color: #C0432B; }
  .icon-btn:focus-visible { outline: 2px solid var(--terracotta); }

  .silo-card-body {
    display: grid;
    grid-template-columns: 100px 1fr;
    gap: 14px;
    align-items: start;
  }

  .silo-graphic-col {
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .silo-svg { width: 100px; height: 125px; }
  .fill-pct {
    font-family: 'Archivo Expanded', sans-serif;
    font-weight: 800;
    font-size: 18px;
    margin-top: -4px;
  }

  .silo-data-col { display: flex; flex-direction: column; gap: 8px; }

  .field-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
    font-size: 13px;
  }
  .field-label { color: var(--ink-soft); font-weight: 500; flex-shrink: 0; }
  .field-input-wrap {
    display: flex;
    align-items: center;
    gap: 5px;
    background: var(--cream);
    border-radius: 8px;
    padding: 5px 8px;
    border: 1px solid var(--rule);
  }
  .field-input {
    width: 56px;
    border: none;
    background: transparent;
    font-family: 'Inter', sans-serif;
    font-weight: 600;
    font-size: 14px;
    text-align: right;
    color: var(--ink);
  }
  .field-input:focus { outline: none; }
  .field-input-wrap:focus-within { border-color: var(--terracotta); }
  .field-unit { font-size: 11px; color: var(--ink-soft); white-space: nowrap; }

  .silo-status-bar {
    margin: 14px -16px 0;
    padding: 9px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 700;
  }
  .status-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }

  .silo-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    padding: 14px 0 16px;
  }
  .stat { display: flex; flex-direction: column; align-items: center; text-align: center; gap: 2px; }
  .stat-num {
    font-family: 'Archivo Expanded', sans-serif;
    font-weight: 800;
    font-size: 20px;
  }
  .stat-num--sm { font-size: 13px; font-weight: 700; font-family: 'Inter', sans-serif; }
  .stat-label {
    font-size: 10.5px;
    color: var(--ink-soft);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }

  .footer-note {
    max-width: 1100px;
    margin: 8px auto 0;
    padding: 0 20px;
    font-size: 12px;
    color: var(--ink-soft);
  }

  @media (max-width: 420px) {
    .silo-card-body { grid-template-columns: 88px 1fr; }
    .silo-svg { width: 88px; height: 110px; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script type="text/babel" data-presets="react">
const { useState, useMemo } = React;

// ---------- Helpers ----------
const fmt = (n, d = 1) =>
  Number.isFinite(n) ? n.toLocaleString("nl-NL", { maximumFractionDigits: d, minimumFractionDigits: 0 }) : "—";

const addDays = (date, days) => {
  if (!Number.isFinite(days)) return null;
  const d = new Date(date);
  d.setDate(d.getDate() + Math.floor(days));
  return d;
};

const fmtDate = (date) =>
  date
    ? date.toLocaleDateString("nl-NL", { weekday: "short", day: "numeric", month: "short" })
    : "—";

function computeSilo(s) {
  const fillPct = s.capacity > 0 ? Math.min(100, Math.max(0, (s.current / s.capacity) * 100)) : 0;
  const daysLeft = s.dailyUse > 0 ? s.current / s.dailyUse : Infinity;
  const reorderInDays = Number.isFinite(daysLeft) ? Math.max(0, daysLeft - s.leadTime) : Infinity;
  const reorderDate = Number.isFinite(daysLeft) ? addDays(new Date(), reorderInDays) : null;
  const emptyDate = Number.isFinite(daysLeft) ? addDays(new Date(), daysLeft) : null;

  let status = "good";
  if (s.dailyUse <= 0) status = "idle";
  else if (daysLeft <= s.leadTime) status = "critical";
  else if (daysLeft <= s.leadTime * 2) status = "warning";

  return { fillPct, daysLeft, reorderInDays, reorderDate, emptyDate, status };
}

const STATUS_META = {
  good: { label: "Op peil", color: "#4F7A52", bg: "#EAF2EA" },
  warning: { label: "Bijna bestellen", color: "#B9842A", bg: "#FBF1DE" },
  critical: { label: "Bestel nu", color: "#C0432B", bg: "#FBEAE6" },
  idle: { label: "Geen verbruik ingesteld", color: "#8A8071", bg: "#F0ECE2" },
};

// ---------- Silo SVG (signature element) ----------
function SiloGraphic({ fillPct, color, idle }) {
  const bodyTop = 14;
  const bodyBottom = 108;
  const bodyHeight = bodyBottom - bodyTop;
  const fillHeight = (fillPct / 100) * bodyHeight;
  const fillY = bodyBottom - fillHeight;
  const clipId = "clip-" + color.replace("#", "");
  const gradId = "grain-" + color.replace("#", "");

  return (
    <svg viewBox="0 0 120 150" className="silo-svg" aria-hidden="true">
      <defs>
        <clipPath id={clipId}>
          <path d="M14,14 L106,14 L106,108 L60,140 L14,108 Z" />
        </clipPath>
        <linearGradient id={gradId} x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stopColor={color} stopOpacity="0.95" />
          <stop offset="100%" stopColor={color} stopOpacity="0.75" />
        </linearGradient>
      </defs>

      <path
        d="M14,14 L106,14 L106,108 L60,140 L14,108 Z"
        fill="#FBF8F1"
        stroke="#2A2117"
        strokeWidth="3"
        strokeLinejoin="round"
      />

      {!idle && fillPct > 0 && (
        <g clipPath={`url(#${clipId})`}>
          <rect x="10" y={fillY} width="100" height={bodyHeight + 40} fill={`url(#${gradId})`} />
          <rect x="10" y={fillY} width="100" height="3" fill={color} opacity="0.9" />
        </g>
      )}

      <path d="M10,14 L60,2 L110,14 Z" fill="#2A2117" />
      <line x1="6" y1="20" x2="6" y2="106" stroke="#C17A3F" strokeWidth="3" strokeLinecap="round" />

      <line x1="14" y1="40" x2="106" y2="40" stroke="#2A2117" strokeWidth="1" opacity="0.15" />
      <line x1="14" y1="66" x2="106" y2="66" stroke="#2A2117" strokeWidth="1" opacity="0.15" />
      <line x1="14" y1="92" x2="106" y2="92" stroke="#2A2117" strokeWidth="1" opacity="0.15" />
    </svg>
  );
}

function FieldRow({ label, unit, value, onChange, step = 1, min = 0 }) {
  return (
    <label className="field-row">
      <span className="field-label">{label}</span>
      <span className="field-input-wrap">
        <input
          type="number"
          inputMode="decimal"
          className="field-input"
          value={value}
          min={min}
          step={step}
          onChange={(e) => onChange(e.target.value === "" ? 0 : parseFloat(e.target.value))}
        />
        <span className="field-unit">{unit}</span>
      </span>
    </label>
  );
}

function SiloCard({ silo, onUpdate, onRemove }) {
  const calc = useMemo(() => computeSilo(silo), [silo]);
  const meta = STATUS_META[calc.status];

  return (
    <div className="silo-card" style={{ "--accent": meta.color }}>
      <div className="silo-card-head">
        <input
          className="silo-name-input"
          value={silo.name}
          onChange={(e) => onUpdate({ ...silo, name: e.target.value })}
          aria-label="Naam silo"
        />
        <button className="icon-btn" onClick={() => onRemove(silo.id)} aria-label="Silo verwijderen" title="Verwijderen">
          ✕
        </button>
      </div>

      <div className="silo-card-body">
        <div className="silo-graphic-col">
          <SiloGraphic fillPct={calc.fillPct} color={meta.color} idle={calc.status === "idle"} />
          <div className="fill-pct" style={{ color: meta.color }}>
            {fmt(calc.fillPct, 0)}%
          </div>
        </div>

        <div className="silo-data-col">
          <FieldRow label="Huidige inhoud" unit="ton" value={silo.current} step={0.5} onChange={(v) => onUpdate({ ...silo, current: v })} />
          <FieldRow label="Capaciteit" unit="ton" value={silo.capacity} step={1} onChange={(v) => onUpdate({ ...silo, capacity: v })} />
          <FieldRow label="Dagelijks verbruik" unit="ton/dag" value={silo.dailyUse} step={0.1} onChange={(v) => onUpdate({ ...silo, dailyUse: v })} />
          <FieldRow label="Levertijd bestelling" unit="dagen" value={silo.leadTime} step={1} onChange={(v) => onUpdate({ ...silo, leadTime: v })} />
        </div>
      </div>

      <div className="silo-status-bar" style={{ background: meta.bg, color: meta.color }}>
        <span className="status-dot" style={{ background: meta.color }} />
        <span className="status-label">{meta.label}</span>
      </div>

      <div className="silo-stats">
        <div className="stat">
          <span className="stat-num">{Number.isFinite(calc.daysLeft) ? fmt(calc.daysLeft, 1) : "∞"}</span>
          <span className="stat-label">dagen voorraad</span>
        </div>
        <div className="stat">
          <span className="stat-num stat-num--sm">{fmtDate(calc.reorderDate)}</span>
          <span className="stat-label">bijbestellen vóór</span>
        </div>
        <div className="stat">
          <span className="stat-num stat-num--sm">{fmtDate(calc.emptyDate)}</span>
          <span className="stat-label">silo leeg op</span>
        </div>
      </div>
    </div>
  );
}

const DEFAULT_SILOS = [
  { id: 1, name: "Tarwe Noord", capacity: 80, current: 22, dailyUse: 1.8, leadTime: 3 },
  { id: 2, name: "Maïs West", capacity: 120, current: 95, dailyUse: 2.4, leadTime: 5 },
  { id: 3, name: "Sojameel", capacity: 40, current: 6, dailyUse: 0.9, leadTime: 4 },
];

const STORAGE_KEY = "silostand-data-v1";

function loadInitial() {
  try {
    const raw = window.localStorage.getItem(STORAGE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) {}
  return DEFAULT_SILOS;
}

function App() {
  const [silos, setSilos] = useState(loadInitial);

  React.useEffect(() => {
    try {
      window.localStorage.setItem(STORAGE_KEY, JSON.stringify(silos));
    } catch (e) {}
  }, [silos]);

  const updateSilo = (updated) => setSilos((prev) => prev.map((s) => (s.id === updated.id ? updated : s)));
  const removeSilo = (id) => setSilos((prev) => prev.filter((s) => s.id !== id));
  const addSilo = () => {
    const id = Date.now();
    setSilos((prev) => [...prev, { id, name: `Silo ${prev.length + 1}`, capacity: 50, current: 25, dailyUse: 1, leadTime: 3 }]);
  };

  const summary = useMemo(() => {
    const withCalc = silos.map((s) => ({ ...s, calc: computeSilo(s) }));
    const critical = withCalc.filter((s) => s.calc.status === "critical").length;
    const warning = withCalc.filter((s) => s.calc.status === "warning").length;
    return { critical, warning, total: silos.length };
  }, [silos]);

  return (
    <div className="app-root">
      <header className="app-header">
        <p className="eyebrow">Voorraadbeheer · erf overzicht</p>
        <h1 className="app-title">Silostand</h1>
        <p className="app-sub">
          Houd de inhoud van al je silo's bij, stel het dagelijkse verbruik in en zie in één oogopslag wanneer je moet bijbestellen.
        </p>
        <div className="summary-row">
          <span className="pill">
            <span className="dot" style={{ background: "#2A2117" }} />
            {summary.total} {summary.total === 1 ? "silo" : "silo's"}
          </span>
          {summary.critical > 0 && (
            <span className="pill" style={{ color: STATUS_META.critical.color }}>
              <span className="dot" style={{ background: STATUS_META.critical.color }} />
              {summary.critical} direct bestellen
            </span>
          )}
          {summary.warning > 0 && (
            <span className="pill" style={{ color: STATUS_META.warning.color }}>
              <span className="dot" style={{ background: STATUS_META.warning.color }} />
              {summary.warning} bijna aan de beurt
            </span>
          )}
        </div>
      </header>

      <div className="main-grid">
        {silos.map((s) => (
          <SiloCard key={s.id} silo={s} onUpdate={updateSilo} onRemove={removeSilo} />
        ))}
        <button className="add-card" onClick={addSilo}>
          <span className="add-card-plus">+</span>
          Silo toevoegen
        </button>
      </div>
      <p className="footer-note">Gegevens worden lokaal in deze browser bewaard.</p>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
